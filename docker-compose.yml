version: "3.8"

services:
  api:
    build: .
    ports:
      - "4567:4567"
    environment:
      - API_KEY=${API_KEY}
      - DB_URL=jdbc:mysql://db:3306/football?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      - db

  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: football
    ports:
      - "3306:3306"
    volumes:
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
